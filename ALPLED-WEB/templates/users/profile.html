{% extends "base.html" %}

{% block title %}{{ title }} | ALPLED{% endblock %}

{% block content %}
<div class="mx-auto max-w-4xl space-y-6">
  <section class="space-y-3">
    <h1 class="text-3xl font-bold text-slate-900">{{ title }}</h1>
    <p class="text-sm text-slate-500">로그인한 사용자 정보를 수정할 수 있습니다.</p>
  </section>

  <section class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
    {% if force_password_change %}
      <div class="mb-6 rounded-2xl border border-amber-200 bg-amber-50 px-5 py-4 text-sm font-medium leading-7 text-amber-900">
        임시 비밀번호가 적용된 계정입니다. 새 비밀번호를 반드시 입력한 뒤 저장해 주세요.
      </div>
    {% endif %}

    <form method="post" class="space-y-8">
      {% csrf_token %}

      <div class="grid gap-6 md:grid-cols-2">
        <div class="space-y-2">
          <label for="profile-user-id" class="block text-sm font-medium text-slate-900">사원번호</label>
          <input id="profile-user-id" type="text" value="{{ profile_form.user_id }}" readonly class="w-full rounded-xl border border-slate-200 bg-slate-100 px-4 py-3 text-sm text-slate-900">
        </div>

        <div class="space-y-2">
          <label for="profile-temp-password" class="block text-sm font-medium text-slate-900">임시 비밀번호 적용 여부</label>
          <input id="profile-temp-password" type="text" value="{{ profile_form.tmpr_pswd_yn }}" readonly class="w-full rounded-xl border border-slate-200 bg-slate-100 px-4 py-3 text-sm text-slate-900">
        </div>

        <div class="space-y-2">
          <label for="profile-name" class="block text-sm font-medium text-slate-900">이름</label>
          <input id="profile-name" name="name" type="text" value="{{ profile_form.name }}" required minlength="2" maxlength="100" pattern="[A-Za-z0-9가-힣_ ]+" title="이름은 한글, 영문, 숫자, 밑줄(_)로 2자 이상 100자 이하로 입력해 주세요." class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 placeholder:text-slate-400" placeholder="이름을 입력해 주세요">
        </div>

        <div class="space-y-2">
          <label for="profile-department" class="block text-sm font-medium text-slate-900">부서</label>
          <input id="profile-department" name="department" type="text" value="{{ profile_form.department }}" maxlength="100" pattern="[A-Za-z0-9가-힣_ ]+" title="부서는 한글, 영문, 숫자, 밑줄(_)로 최대 100자까지 입력해 주세요." class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 placeholder:text-slate-400" placeholder="부서를 입력해 주세요">
        </div>

        <div class="space-y-2">
          <label for="profile-position" class="block text-sm font-medium text-slate-900">직급</label>
          <input id="profile-position" name="position" type="text" value="{{ profile_form.position }}" maxlength="100" pattern="[A-Za-z0-9가-힣_ ]+" title="직급은 한글, 영문, 숫자, 밑줄(_)로 최대 100자까지 입력해 주세요." class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 placeholder:text-slate-400" placeholder="직급을 입력해 주세요">
        </div>

        <div class="space-y-2">
          <label for="profile-new-password" class="block text-sm font-medium text-slate-900">새 비밀번호</label>
          <input id="profile-new-password" name="new_password" type="password" value="" class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 placeholder:text-slate-400" placeholder="새 비밀번호를 입력해 주세요">
        </div>

        <div class="space-y-2 md:col-start-2">
          <label for="profile-new-password-confirm" class="block text-sm font-medium text-slate-900">새 비밀번호 확인</label>
          <input id="profile-new-password-confirm" name="new_password_confirm" type="password" value="" class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 placeholder:text-slate-400" placeholder="새 비밀번호를 다시 입력해 주세요">
        </div>
      </div>

      <div class="flex justify-end">
        <button type="submit" class="rounded-xl bg-blue-600 px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700">
          개인 정보 저장
        </button>
      </div>
    </form>
  </section>
</div>
{% endblock %}
