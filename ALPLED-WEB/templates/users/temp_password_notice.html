{% extends "base.html" %}

{% block title %}{{ title }} | ALPLED{% endblock %}

{% block content %}
<div
  data-auto-notice
  data-notice-title="임시 비밀번호 안내"
  data-notice-message="임시 비밀번호입니다. 비밀번호를 변경해 주세요."
  data-notice-button-text="비밀번호 변경"
  data-notice-redirect-url="{{ profile_url }}"
></div>

<div class="mx-auto flex min-h-[70vh] max-w-2xl items-center justify-center">
  <section class="w-full rounded-[2rem] border border-slate-200 bg-white p-8 shadow-sm">
    <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-amber-100 text-2xl font-bold text-amber-700">
      !
    </div>
    <div class="mt-6 space-y-3 text-center">
      <h1 class="text-2xl font-bold text-slate-900">{{ title }}</h1>
      <p class="text-sm leading-7 text-slate-600">
        임시 비밀번호가 적용된 계정입니다. 확인 버튼을 누르면 개인 정보 수정 화면으로 이동합니다.
      </p>
    </div>
    <div class="mt-8 flex justify-center">
      <a href="{{ profile_url }}" class="rounded-xl bg-blue-600 px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700">
        비밀번호 변경하기
      </a>
    </div>
  </section>
</div>
{% endblock %}
