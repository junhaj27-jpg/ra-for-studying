{% if register_only %}
  <div id="doc-job-progress-root" data-modal-root data-job-progress-root class="fixed inset-0 z-[70] hidden items-center justify-center bg-slate-950/60 p-4">
    <div class="w-full max-w-md">
      <div class="overflow-hidden rounded-[1.5rem] bg-white shadow-xl">
        <div class="border-b border-slate-200 px-6 py-5">
          <h3 data-job-progress-title class="text-lg font-semibold text-slate-900">문서 작업 진행 중</h3>
          <p class="mt-1 text-sm text-slate-500">완료되면 자동으로 다음 화면으로 이동합니다.</p>
        </div>
        <div class="space-y-6 px-6 py-6">
          <p data-job-progress-message class="text-sm leading-7 text-slate-700">요청을 처리하고 있습니다.</p>
          <div class="flex justify-center">
            <div class="relative flex h-32 w-32 items-center justify-center">
              <div class="absolute inset-0 rounded-full border-4 border-slate-200"></div>
              <div data-job-progress-spinner class="absolute inset-0 rounded-full border-4 border-blue-600 border-t-transparent animate-spin"></div>
              <div class="relative text-center">
                <p class="text-xs font-medium uppercase tracking-wide text-slate-500">Elapsed</p>
                <p data-job-progress-elapsed class="mt-1 text-lg font-semibold text-slate-900">00:00</p>
              </div>
            </div>
          </div>
          <p class="text-xs text-slate-500">브라우저를 닫지 말고 잠시만 기다려 주세요.</p>
        </div>
      </div>
    </div>
  </div>
{% endif %}
